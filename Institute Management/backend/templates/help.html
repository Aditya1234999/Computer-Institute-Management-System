<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Ask Query | Balaji Institute</title>
    <!-- Use existing CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f0fdfa, #e0f2f1);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .query-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border-top: 5px solid #009688;
            animation: slideUpFade 0.8s ease-out;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #64748b;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
            transition: 0.3s;
            outline: none;
            font-family: 'Poppins', sans-serif;
        }

        .form-group textarea {
            resize: vertical;
            height: 100px;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #009688;
            box-shadow: 0 0 0 3px rgba(0, 150, 136, 0.1);
        }

        .btn-submit {
            width: 100%;
            background: #009688;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background: #00796b;
            animation: pulse-grow 1s infinite;
        }

        .back-link {
            display: block;
            margin-top: 20px;
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <!-- Floating Particles -->
    <div class="bg-particle" style="top:10%; left:10%; width:50px; height:50px; animation-duration:12s;"></div>
    <div class="bg-particle" style="top:80%; left:80%; width:70px; height:70px; animation-duration:18s;"></div>

    <div class="query-card">
        <img src="{{ url_for('static', filename='assets/Logo.png') }}" alt="Logo"
            style="height: 60px; margin-bottom: 20px;">
        <h2 style="color: #1e293b; margin-bottom: 25px;">Ask a Query</h2>

        <form id="queryForm">
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" id="name" class="input-animate" placeholder="Enter Full Name" required>
            </div>
            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" id="mobile" class="input-animate" placeholder="Enter Mobile Number" required>
            </div>
            <div class="form-group">
                <label>Your Message</label>
                <textarea id="message" class="input-animate" placeholder="How can we help you?" required></textarea>
            </div>
            <button type="submit" class="btn-submit">Send Message</button>
        </form>

        <a href="/" class="back-link">← Back to Home</a>
    </div>

    <script>
        document.getElementById('queryForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const mobile = document.getElementById('mobile').value;
            const message = document.getElementById('message').value;
            const btn = document.querySelector('.btn-submit');

            btn.innerText = "Sending...";
            btn.disabled = true;

            try {
                const response = await fetch('/submit-query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, mobile, message })
                });

                if (response.ok) {
                    alert('Query sent successfully! We will contact you soon.');
                    window.location.href = '/';
                } else {
                    alert('Failed to send query. Please try again.');
                    btn.innerText = "Send Message";
                    btn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                alert('An error occurred.');
                btn.innerText = "Send Message";
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
