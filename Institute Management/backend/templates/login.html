<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Login | Balaji Institute</title>
    <!-- Use existing CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* Specific Login Styles */
        body {
            background: linear-gradient(135deg, #f0fdfa, #e0f2f1);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border-top: 5px solid #009688;
            animation: slideUpFade 0.8s ease-out;
        }

        .login-card h2 {
            color: #1e293b;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #64748b;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
            transition: 0.3s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #009688;
            box-shadow: 0 0 0 3px rgba(0, 150, 136, 0.1);
        }

        .btn-submit {
            width: 100%;
            background: #009688;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background: #00796b;
        }

        .back-link {
            display: block;
            margin-top: 20px;
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover {
            color: #009688;
        }
    </style>
</head>

<body>

    <div class="bg-particle" style="top:10%; left:10%; width:50px; height:50px; animation-duration:12s;"></div>
    <div class="bg-particle" style="top:70%; left:80%; width:80px; height:80px; animation-duration:18s;"></div>
    <div class="bg-particle" style="top:40%; left:60%; width:40px; height:40px; animation-duration:15s;"></div>

    <div class="login-card">
        <img src="{{ url_for('static', filename='assets/Logo.png') }}" alt="Logo"
            style="height: 80px; margin-bottom: 15px;">
        <h2>Admin Login</h2>
        <form action="/login" method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="input-animate" placeholder="Enter Admin Username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="input-animate" placeholder="Enter Password" required>
            </div>
            <button type="submit" class="btn-submit btn-pulse">Login</button>
        </form>
        <a href="/" class="back-link">← Back to Home</a>
    </div>

</body>

</html>
